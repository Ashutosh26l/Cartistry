name: CI Checks

on:
  pull_request:
    branches:
      - main
      - prod-ec2

jobs:
  server-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax Check
        run: node --check index.js
